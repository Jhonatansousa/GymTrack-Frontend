<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close(false)">Cancelar</button>
  <button mat-flat-button color="warn" type="button" (click)="close(true)">
    Confirmar
  </button>
</mat-dialog-actions>
