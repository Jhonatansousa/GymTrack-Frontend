@if (isLoading()) {
  <div class="sets-loading">Carregando séries...</div>
} @else {
  @if (hasError()) {
    <div class="sets-error">Erro ao carregar/atualizar séries.</div>
  }

  <button
    mat-flat-button
    color="primary"
    type="button"
    class="add-set-button"
    (click)="addNewSet()"
  >
    Adicionar Nova Série
  </button>

  @if (sets().length === 0) {
    <p class="sets-empty">Nenhuma série cadastrada para este exercício.</p>
  } @else {
    <div class="sets-table-wrapper">
      <div class="sets-header">
        <span>Série (Nome)</span>
        <span>Carga (kg)</span>
        <span>Repetições</span>
        <span>Ações</span>
      </div>

      @for (set of sets(); track set.exerciseSetId) {
        <app-set-row
          [set]="set"
          (deleted)="onSetDeleted($event)"
          (updated)="onSetUpdated($event)"
        />
      }
    </div>
  }
}
