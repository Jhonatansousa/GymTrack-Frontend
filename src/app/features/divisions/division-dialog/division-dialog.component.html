<h2 mat-dialog-title>
  @if (isEditMode) {
    Editar Divisão
  } @else {
    Nova Divisão
  }
</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome da divisão</mat-label>
      <input matInput formControlName="name" placeholder="Ex.: Peito e Tríceps" />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <mat-error>Nome é obrigatório.</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancelar</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="form.invalid"
    (click)="save()"
  >
    Salvar
  </button>
</mat-dialog-actions>
